# ============================================
# JengoRoute - Docker Compose for Local Development
# ============================================
# Usage:
#   docker-compose up -d redis     # Start Redis only (use Supabase cloud for DB)
#   docker-compose up              # Start all services
#
# The frontend (Next.js) and backend (FastAPI) are typically run
# directly with `npm run dev` and `uvicorn` for hot-reload.
# This compose file provides Redis and optional local services.
# ============================================

version: '3.8'

services:
  # --- Redis (required for async message queue) ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- FastAPI Backend (optional - can also run with uvicorn directly) ---
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # --- RQ Worker (processes WhatsApp messages from Redis queue) ---
  worker:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python worker.py

volumes:
  redis_data:

